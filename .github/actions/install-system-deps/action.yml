name: 'Install System Dependencies'
description: 'Install system dependencies for Tauri builds across platforms'
inputs:
  os:
    description: 'Operating system (ubuntu, windows)'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Cache apt packages (Ubuntu)
      if: inputs.os == 'ubuntu'
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: >-
          build-essential pkg-config curl wget file libssl-dev xvfb nasm
          libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
          libwebkit2gtk-4.1-dev
          libglib2.0-dev libgdk-pixbuf2.0-dev libatk1.0-dev libpango1.0-dev
          libcairo2-dev libcairo-gobject2 libgdk-pixbuf-2.0-0
          libjavascriptcoregtk-4.1-dev
          libxdo-dev libxrandr2 libxss1 libxcursor1 libxcomposite1
          libasound2-dev libxdamage1 libxext6 libxfixes3 libxi6 libxrender1
          libdbus-1-dev
        version: 1.0

    - name: Verify system dependencies (Ubuntu)
      if: inputs.os == 'ubuntu'
      shell: bash
      run: |
        pkg-config --exists webkit2gtk-4.1 && echo "✅ webkit2gtk-4.1 found" || echo "❌ webkit2gtk-4.1 missing"
        pkg-config --exists javascriptcoregtk-4.1 && echo "✅ javascriptcoregtk-4.1 found" || echo "❌ javascriptcoregtk-4.1 missing"
        echo "✅ NASM: $(nasm -v)"

    - name: Install system dependencies (Windows)
      if: inputs.os == 'windows'
      shell: pwsh
      run: |
        Write-Host "🔧 Installing system dependencies for Windows..."

        # Install NASM for optimized AVIF encoding
        Write-Host "📦 Installing NASM..."
        choco install nasm -y

        # Add NASM to PATH for this session
        $nasmPath = "C:\Program Files\NASM"
        if (Test-Path $nasmPath) {
          $env:PATH = "$nasmPath;$env:PATH"
          Write-Host "✅ NASM installed and added to PATH"
          nasm -v
        } else {
          Write-Host "⚠️ NASM installation path not found at expected location"
        }

        Write-Host "✅ Windows dependencies check completed!"

    - name: Add NASM to PATH (Windows)
      if: inputs.os == 'windows'
      shell: bash
      run: |
        # Ensure NASM is in PATH for subsequent steps
        echo "C:\Program Files\NASM" >> $GITHUB_PATH