name: 'Build and Release'

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        shell: bash
        run: |
          echo "PNPM version:"
          pnpm --version
          echo "Node version:"
          node --version

          # Install dependencies with cross-platform fallback strategy
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
          echo "Dependencies installed successfully"

      - name: Get version from package.json
        id: version
        run: |
          # Get current version from package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "Version: $VERSION"

          # Check if this version tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping release"
            SHOULD_RELEASE="false"
          else
            # Check if we should create a release (only on main/master pushes or manual trigger)
            SHOULD_RELEASE="false"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
               [[ "${{ github.event_name }}" == "push" && ("${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master") ]]; then
              SHOULD_RELEASE="true"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

  wait-for-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Tests workflow to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for Tests workflow to complete for commit ${{ github.sha }}..."
          for i in $(seq 1 30); do
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/test.yaml/runs?head_sha=${{ github.sha }}&per_page=1" --jq '.workflow_runs[0].id // empty' 2>/dev/null || echo "")
            if [ -n "$RUN_ID" ]; then
              echo "Found Tests workflow run: $RUN_ID"
              gh run watch "$RUN_ID" --repo "${{ github.repository }}" --exit-status
              exit $?
            fi
            echo "Waiting for Tests workflow to start (attempt $i/30)..."
            sleep 10
          done
          echo "❌ Tests workflow not found for this commit"
          exit 1

  build-and-release:
    needs: [get-version, wait-for-tests]
    if: needs.get-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc --features nasm'
            target: 'x86_64-pc-windows-msvc'
          - platform: 'ubuntu-22.04'
            args: '--target x86_64-unknown-linux-gnu --features nasm'
            target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps
        with:
          os: ${{ matrix.platform == 'ubuntu-22.04' && 'ubuntu' || 'windows' }}

      - name: Install frontend dependencies
        shell: bash
        run: |
          echo "PNPM version:"
          pnpm --version
          echo "Platform: ${{ matrix.platform }}"

          # Install dependencies with cross-platform fallback strategy
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
          echo "Dependencies installed successfully"

      - name: Verify version consistency
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")

          echo "📋 Version Check:"
          echo "  package.json: $PACKAGE_VERSION"
          echo "  Cargo.toml: $CARGO_VERSION"
          echo "  tauri.conf.json: $TAURI_VERSION"
          echo "  Expected: ${{ needs.get-version.outputs.version }}"

          if [[ "$PACKAGE_VERSION" != "${{ needs.get-version.outputs.version }}" ]]; then
            echo "❌ Version mismatch in package.json"
            exit 1
          fi

          if [[ "$CARGO_VERSION" != "${{ needs.get-version.outputs.version }}" ]]; then
            echo "❌ Version mismatch in Cargo.toml"
            exit 1
          fi

          if [[ "$TAURI_VERSION" != "${{ needs.get-version.outputs.version }}" ]]; then
            echo "❌ Version mismatch in tauri.conf.json"
            exit 1
          fi

          echo "✅ All versions are consistent!"

      - name: Build frontend
        run: pnpm run build

      - name: Extract release notes from CHANGELOG
        id: release_notes
        shell: bash
        run: |
          echo "Extracting release notes from CHANGELOG.md..."

          VERSION="${{ needs.get-version.outputs.version }}"

          # Extract the section for this version from CHANGELOG.md
          # This gets everything between "## [VERSION]" and the next "## [" or end of file
          CHANGELOG_CONTENT=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          # Create formatted release body
          {
            echo "## 🆕 What's New in v$VERSION"
            echo ""
            if [ -n "$CHANGELOG_CONTENT" ]; then
              echo "$CHANGELOG_CONTENT"
            else
              echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details."
            fi
            echo ""
            echo "---"
            echo ""
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              echo "**📋 Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v$VERSION"
            else
              echo "**📋 Full Changelog**: https://github.com/${{ github.repository }}/commits/v$VERSION"
            fi
            echo ""
            echo "💡 **Note**: The app will automatically restart after updating."
          } > release_notes.md

          # Output for use in next step
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.get-version.outputs.version }}
          releaseName: 'VRChat Photo Uploader v${{ needs.get-version.outputs.version }}'
          releaseBody: ${{ steps.release_notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename uploaded Linux packages
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Renaming uploaded Linux packages..."

          # Get the release ID
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/v${{ needs.get-version.outputs.version }} --jq '.id')
          echo "Release ID: $RELEASE_ID"

          # Get all assets and rename the Linux packages
          gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --jq '.[] | select(.name | contains("vr-chat-photo-uploader")) | {id: .id, name: .name}' | while read -r asset; do
            if [ -n "$asset" ]; then
              asset_id=$(echo "$asset" | jq -r '.id')
              old_name=$(echo "$asset" | jq -r '.name')
              new_name=$(echo "$old_name" | sed 's/vr-chat-photo-uploader/VRChat-Photo-Uploader/g')

              echo "Renaming asset: $old_name -> $new_name"
              gh api repos/${{ github.repository }}/releases/assets/$asset_id -X PATCH -f name="$new_name"
            fi
          done

          echo "✅ Asset renaming completed"

      - name: Verify signatures and generate checksums
        shell: bash
        run: |
          echo "🔍 Verifying build artifacts and generating checksums..."

          # Find all release files in common Tauri output locations
          RELEASE_FILES=$(find . -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null || true)

          # Also check specific Tauri bundle locations
          if [ -z "$RELEASE_FILES" ]; then
            echo "🔍 Searching in specific bundle locations..."
            BUNDLE_LOCATIONS=(
              "src-tauri/target/release/bundle"
              "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
              "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
            )

            for location in "${BUNDLE_LOCATIONS[@]}"; do
              if [ -d "$location" ]; then
                echo "📁 Checking: $location"
                FOUND_FILES=$(find "$location" -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null || true)
                if [ -n "$FOUND_FILES" ]; then
                  RELEASE_FILES="$RELEASE_FILES $FOUND_FILES"
                fi
              fi
            done
          fi

          if [ -z "$RELEASE_FILES" ]; then
            echo "❌ No release files found anywhere"
            echo "🔍 Debug: Listing all files in src-tauri/target:"
            find src-tauri/target -type f -name "*" 2>/dev/null | head -20 || echo "No files found in src-tauri/target"
            echo "🔍 Debug: Listing current directory contents:"
            ls -la
            exit 1
          fi

          # Clean up the RELEASE_FILES variable (remove extra spaces)
          RELEASE_FILES=$(echo $RELEASE_FILES | tr -s ' ')

          # Create checksums directory
          mkdir -p checksums

          for file in $RELEASE_FILES; do
            if [ -f "$file" ]; then
              echo "Checking: $file"

              # Verify file exists and is not empty
              if [ ! -s "$file" ]; then
                echo "❌ Empty file: $file"
                exit 1
              fi

              # Get file info
              FILE_SIZE=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
              echo "  Size: $FILE_SIZE bytes"

              # Generate checksums
              FILENAME=$(basename "$file")
              SHA256=$(sha256sum "$file" 2>/dev/null | cut -d' ' -f1 || shasum -a 256 "$file" | cut -d' ' -f1)
              echo "  SHA256: $SHA256"
              echo "$SHA256  $FILENAME" >> checksums/SHA256SUMS

              # Check for signature files (Tauri may generate these)
              if [ -f "${file}.sig" ]; then
                echo "  ✅ Signature found: ${file}.sig"
              elif [ -f "${file}.asc" ]; then
                echo "  ✅ Signature found: ${file}.asc"
              else
                echo "  ℹ️ No detached signature file (may be embedded)"
              fi

              # Platform-specific signature verification
              case "$file" in
                *.exe|*.msi)
                  # Windows: Check for Authenticode signature
                  if command -v osslsigncode >/dev/null 2>&1; then
                    osslsigncode verify "$file" && echo "  ✅ Windows signature verified" || echo "  ⚠️ Windows signature check failed"
                  else
                    echo "  ℹ️ Windows signature verification skipped (osslsigncode not available)"
                  fi
                  ;;
                *.deb|*.AppImage)
                  # Linux: Basic file integrity check
                  file "$file" | grep -q "executable" && echo "  ✅ Linux executable verified" || echo "  ⚠️ Linux executable check failed"
                  ;;
              esac
            fi
          done

          # Sort checksums file
          if [ -f checksums/SHA256SUMS ]; then
            sort checksums/SHA256SUMS -o checksums/SHA256SUMS
            echo "✅ Generated checksums/SHA256SUMS"
            cat checksums/SHA256SUMS
          else
            echo "❌ No checksums generated"
            exit 1
          fi

          echo "✅ Artifact verification complete"

      - name: Upload checksums as artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.target }}
          path: checksums/
          retention-days: 90

  build-test:
    needs: [get-version, wait-for-tests]
    if: needs.get-version.outputs.should_release == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: 'windows'
            artifact-name: 'pr-build-windows-x64'
            binary-path: 'src-tauri/target/release/VRChat-Photo-Uploader.exe'
          - platform: 'ubuntu-22.04'
            os: 'ubuntu'
            artifact-name: 'pr-build-linux-x64'
            binary-path: 'src-tauri/target/release/VRChat-Photo-Uploader'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps
        with:
          os: ${{ matrix.os }}

      - name: Install frontend dependencies
        shell: bash
        run: |
          echo "PNPM version: $(pnpm --version)"

          # Install dependencies with fallback strategy
          if pnpm install --frozen-lockfile 2>/dev/null; then
            echo "✅ Installed with frozen lockfile"
          else
            echo "⚠️ Frozen lockfile incompatible, installing without frozen lockfile..."
            pnpm install --no-frozen-lockfile
            echo "✅ Dependencies installed successfully"
          fi

      - name: Build Tauri app (test build)
        shell: bash
        run: pnpm tauri build --features nasm

      - name: List build artifacts
        shell: bash
        run: |
          echo "📦 Build artifacts that would be included in a release:"
          echo ""
          BUNDLE_DIR="src-tauri/target/release/bundle"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -type f | while read -r file; do
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
              SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc 2>/dev/null || echo "${SIZE}B")
              echo "  $(basename "$file") — ${SIZE_MB} MB"
            done
          else
            echo "⚠️ No bundle directory found at $BUNDLE_DIR"
            echo "Checking target directory structure:"
            find src-tauri/target/release -maxdepth 3 -type d 2>/dev/null | head -20
          fi

      - name: Upload PR build artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.binary-path }}
            src-tauri/target/release/bundle/
          retention-days: 7
